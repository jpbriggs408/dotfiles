# =============================================================================
#  tmux.conf -- Persistent terminal workspace
#
#  Managed by dotfiles (~/dotfiles/tmux/tmux.conf -> ~/.tmux.conf)
#  Prefix key: Ctrl-b (default)
#
#  Quick reference:
#    Ctrl-b |           Split pane vertically (side by side)
#    Ctrl-b -           Split pane horizontally (top/bottom)
#    Ctrl-b h/j/k/l     Navigate panes (vim-style)
#    Ctrl-b H/J/K/L     Resize panes (repeatable)
#    Ctrl-b Tab          Cycle through panes
#    Ctrl-b z            Zoom/unzoom current pane (fullscreen toggle)
#    Ctrl-b c            New window (in current directory)
#    Ctrl-b 1-9          Switch to window by number
#    Ctrl-b ,            Rename current window
#    Ctrl-b [            Enter copy mode (vi keys: v=select, y=yank)
#    Ctrl-b d            Detach (session keeps running in background)
#    Ctrl-b r            Reload this config file
#
#  Sessions survive SSH disconnects. Reconnect and attach with:
#    tmux a              Attach to last session
#    tmux a -t work      Attach to named session
#    dev                 Create/attach to dev workspace (see shell_common)
# =============================================================================


# =============================================================================
#  General Settings
# =============================================================================

# Start numbering windows and panes at 1 instead of 0.
# Keys 1-9 are easier to reach than 0, and it matches the visual order
# in the status bar.
set -g base-index 1
setw -g pane-base-index 1

# When a window is closed, renumber the remaining windows sequentially.
# Prevents gaps like [1] [3] [5] after closing windows 2 and 4.
set -g renumber-windows on

# Increase scrollback buffer from the default 2000 lines to 50000.
# Build output, test results, and log tailing can easily exceed 2000 lines.
set -g history-limit 50000

# Reduce the delay after pressing Escape from 500ms to 10ms.
# The default 500ms delay makes vim feel sluggish when switching modes
# (Escape -> command mode). 10ms is fast enough to feel instant while
# still allowing escape sequences to be recognized.
set -sg escape-time 10

# Enable mouse support:
#   - Scroll through scrollback with the mouse wheel / trackpad
#   - Click a pane to select it
#   - Drag pane borders to resize
#   - Click window tabs in the status bar to switch
set -g mouse on

# Enable 256-color and true color (24-bit) support.
# "screen-256color" is the most compatible TERM value for tmux.
# The terminal-overrides line enables true color for xterm-compatible
# terminals (iTerm2, Terminal.app, VS Code, etc.)
set -g default-terminal "screen-256color"
set -sa terminal-overrides ",xterm*:Tc"

# Activity monitoring: when a background window produces output,
# subtly highlight its tab in the status bar. visual-activity=off
# prevents an intrusive "Activity in window X" message.
setw -g monitor-activity on
set -g visual-activity off

# Keep window names stable. By default tmux renames windows to match
# the currently running command (e.g. "vim", "make"). This makes it
# hard to maintain meaningful names like "claude" or "tests".
set -g allow-rename off

# Keep the server alive even when no clients are attached.
# Essential for the `dev` launcher which creates sessions in detached
# mode before you attach. Without this, tmux exits immediately.
set -g exit-empty off


# =============================================================================
#  Key Bindings
# =============================================================================

# Reload this config file without restarting tmux.
# Useful when tweaking settings -- just press prefix + r.
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Intuitive pane splits that open in the current working directory.
# Default: " (horizontal) and % (vertical) -- hard to remember.
# New:     - (horizontal, like a minus sign dividing top/bottom)
#          | (vertical, like a pipe dividing left/right)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows also open in the current directory instead of $HOME.
bind c new-window -c "#{pane_current_path}"

# Navigate between panes using vim-style hjkl keys.
# Much faster than arrow keys since your hands stay on home row.
bind h select-pane -L    # left
bind j select-pane -D    # down
bind k select-pane -U    # up
bind l select-pane -R    # right

# Resize panes with vim-style keys (uppercase).
# The -r flag makes these repeatable: hold prefix, then tap H/J/K/L
# multiple times to keep resizing without pressing prefix again.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Cycle through panes with prefix + Tab.
# Handy when you have many panes and just want to jump to the next one.
bind Tab select-pane -t :.+


# =============================================================================
#  Copy Mode
# =============================================================================

# Use vi-style keys in copy mode (triggered by prefix + [).
# Navigate with hjkl, search with /, etc.
setw -g mode-keys vi

# In copy mode:
#   v   Start visual selection (like vim visual mode)
#   y   Yank (copy) selection and exit copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel


# =============================================================================
#  Status Bar
# =============================================================================

# Colors are pulled from the oh-my-posh theme palette to keep the
# terminal visually consistent:
#   Background: Denim Dark (#232347)
#   Text:       Blue (#779AD7)
#   Accents:    Magenta (#9E87CF), Grey (#6C6C6C), Red (#D57389)

# Refresh the status bar every 5 seconds (for the clock, etc.)
set -g status-interval 5

# Place the status bar at the bottom of the terminal.
set -g status-position bottom

# Default status bar colors
set -g status-style "bg=#232347,fg=#779AD7"

# Left side: session name (e.g. "work", "dev")
# The session name tells you which workspace you're in.
set -g status-left-length 30
set -g status-left "#[fg=#9E87CF,bold] #S #[fg=#6C6C6C]| "

# Right side: hostname and time
# Hostname is useful when you have multiple VMs or machines.
set -g status-right-length 50
set -g status-right "#[fg=#6C6C6C]#h  %H:%M "

# Window tabs in the status bar:
#   Inactive: dim text
#   Active:   inverted blue highlight (stands out)
#   Activity: red text (something happened in a background window)
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#232347,bg=#779AD7,bold] #I:#W "
setw -g window-status-activity-style "fg=#D57389"

# Pane border colors:
#   Inactive: grey (subtle)
#   Active:   magenta (matches prompt accent)
set -g pane-border-style "fg=#6C6C6C"
set -g pane-active-border-style "fg=#9E87CF"
